prometheus:
  prometheusSpec:
    # schedule Prometheus onto the beefy amd64 node
    nodeSelector:
      workload: heavy

    # keep 7 days of metrics (default is 10d; trim to save disk)
    retention: 7d
    retentionSize: 8GB          # hard cap so the TSDB can't fill the PV

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 2Gi             # Prometheus wants room;

    # persistent storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # scrape everything the operator discovers, not just chart-managed monitors.
    # (false = pick up ServiceMonitors you create yourself for your own app later)
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# ---------------------------------------------------------------------------
# GRAFANA — pin to heavy node. Access via ingress+TLS (dev.grafana.mikeflot.com).
# ---------------------------------------------------------------------------
grafana:
  nodeSelector:
    workload: heavy

  # set an explicit admin password (or pull from an existing secret — see note below)
  adminPassword: "CHANGE_ME_BEFORE_INSTALL"

  # small footprint; Grafana is light
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

  # ---- Ingress + TLS via your existing cert-manager + nginx setup ----
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - dev.grafana.mikeflot.com
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: grafana-tls
        hosts:
          - dev.grafana.mikeflot.com

  # tell Grafana its external URL so redirects/links are correct behind the ingress
  grafana.ini:
    server:
      root_url: https://dev.grafana.mikeflot.com
      # Grafana serves from behind the TLS-terminating ingress
      enforce_domain: false

# ---------------------------------------------------------------------------
# ALERTMANAGER — keep it, but pin to heavy and keep it tiny (no receivers wired yet)
# ---------------------------------------------------------------------------
alertmanager:
  alertmanagerSpec:
    nodeSelector:
      workload: heavy
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# ---------------------------------------------------------------------------
# node-exporter — DaemonSet on ALL nodes (this is what surfaces per-node
# memory/CPU/disk you've been debugging blind). Leave it spread everywhere.
# No nodeSelector — you WANT it on every node.
# ---------------------------------------------------------------------------
prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

# ---------------------------------------------------------------------------
# kube-state-metrics — pin to heavy.
# ---------------------------------------------------------------------------
kube-state-metrics:
  nodeSelector:
    workload: heavy
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

# ---------------------------------------------------------------------------
# Prometheus Operator itself — pin to heavy.
# ---------------------------------------------------------------------------
prometheusOperator:
  nodeSelector:
    workload: heavy
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi