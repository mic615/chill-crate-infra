apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chill-crate-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mic615/chill-crate-api.git
    targetRevision: main
    path: deploy/chart
  destination:
    server: https://kubernetes.default.svc
    namespace: chill-crate
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
