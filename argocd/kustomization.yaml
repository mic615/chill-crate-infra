apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.4/manifests/install.yaml

patches:
  - path: nodeselector-patch.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=argocd"
  - path: nodeselector-patch.yaml
    target:
      kind: StatefulSet
      labelSelector: "app.kubernetes.io/part-of=argocd"
